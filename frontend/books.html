<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <h1>Books Management</h1>
</nav>

<div class="container">

    <h2>Add Book</h2>

    <form id="bookForm">

        <input
            type="text"
            id="title"
            placeholder="Book Title"
            required
        >

        <input
            type="text"
            id="author"
            placeholder="Author"
            required
        >

        <input
            type="text"
            id="category"
            placeholder="Category"
            required
        >

        <input
            type="number"
            id="quantity"
            placeholder="Quantity"
            required
        >

        <button type="submit">
            Add Book
        </button>

    </form>

    <h2>Books List</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Quantity</th>
            </tr>
        </thead>

        <tbody id="booksTable">

        </tbody>

    </table>

</div>

<script src="js/books.js"></script>

</body>
</html>
