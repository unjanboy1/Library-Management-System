<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>📚 Books Inventory</h2>
        <a href="{{ url_for('dashboard') }}" class="back-link">&larr; Back to Dashboard</a>
        
        <h3>Add New Book</h3>
        <form method="POST" action="{{ url_for('books.manage_books') }}" class="form-inline">
            <div style="flex: 2; display: flex; gap: 15px;">
                <input type="text" name="title" placeholder="Book Title" required>
                <input type="text" name="author" placeholder="Author Name" required>
            </div>
            <button type="submit">Add Book</button>
        </form>
        
        <h3>Current Inventory</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Management</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td>{{ book.id }}</td>
                    <td><strong>{{ book.title }}</strong></td>
                    <td>{{ book.author }}</td>
                    <td>
                        {% if book.available %}
                            <span class="badge badge-success">Available</span>
                        {% else %}
                            <span class="badge badge-danger">Borrowed</span>
                        {% endif %}
                    </td>
                    <td>
                       <form method="POST" action="{{ url_for('books.delete_book', book_id=book.id) }}" style="display:inline; margin:0; padding:0;">
                         <button type="submit" class="btn-danger-sm">Delete</button>
                       </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-secondary);">No books registered yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
