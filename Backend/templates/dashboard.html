<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
</head>
<body>
    <h2>Library Control Dashboard</h2>
    <hr>
    <div>
        <h3>Quick Stats</h3>
        <p>Total Books: <strong>{{ books_count }}</strong></p>
        <p>Registered Students: <strong>{{ students_count }}</strong></p>
        <p>Active Issues: <strong>{{ tx_count }}</strong></p>
    </div>
    <hr>
    <h3>Management Actions</h3>
    <ul>
        <li><a href="{{ url_for('books.manage_books') }}">📚 Manage Books Catalog</a></li>

        <li><a href="{{ url_for('transactions.manage_transactions') }}">🔄 Issue / Return Books</a></li>
    </ul>
    <br>
    <a href="{{ url_for('home') }}">Log Out</a>
</body>
</html>
